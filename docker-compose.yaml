services :
  catalogue:
    build: ./catalogue
    image: annurukulasekhar/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build: ./user
    image: annurukulasekhar/user:1.0.0
    container_name: user
    depends_on:
    - redis
  frontend:
    build: ./frontend
    image: annurukulasekhar/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
  mongodb:
    build: ./mongodb # it moves to mongodb directory
    image: annurukulasekhar/mongodb:1.0.0 #docker build -t annurukulasekhar/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis
networks:
  default: 
    driver: bridge
    name: roboshop
    external: false #if true, you need to create manually