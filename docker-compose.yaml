services :
  catalogue:
    build: ./catalogue
    image: annurukulasekhar/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build: ./user
    image: annurukulasekhar/user:1.0.0
    container_name: user
    depends_on:
    - redis
    - mongodb
  cart:
    build: ./cart
    image: annurukulasekhar/cart:1.0.0
    container_name: cart
    depends_on:
    - redis
    - catalogue
  shipping:
    build: ./shipping
    image: annurukulasekhar/shipping:1.0.0
    container_name: shipping
    depends_on:
    - mysql
    - cart
  frontend:
    build: ./frontend
    image: annurukulasekhar/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    - shipping
    - payment
  mongodb:
    build: ./mongodb # it moves to mongodb directory
    image: annurukulasekhar/mongodb:1.0.0 #docker build -t annurukulasekhar/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis
  mysql:
    build: ./mysql
    image: annurukulasekhar/mysql:1.0.0
    container_name: mysql
  rabbitmq:
    image: rabbitmq:3
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq
   
networks:
  default: 
    driver: bridge
    name: roboshop
    external: false #if true, you need to create manually